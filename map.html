<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/map.css">
</head>

<body>
  <header class="navbar" id="navbar">
    <div class="nav-container">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="icon-menu" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="icon-close" viewBox="0 0 16 16">
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
        </svg>
      </button>

      <div class="nav-links" id="nav-links">
        <a href="index.html">KD Select</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="map.html">Maps</a>
        <a href="equipment.html">Equipment Editor</a>
      </div>

      <label class="theme-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sun" viewBox="0 0 16 16">
          <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
        </svg>
        <input type="checkbox" id="toggle-theme">
        <span class="toggle-slider"></span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-moon" viewBox="0 0 16 16">
          <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278M4.858 1.311A7.27 7.27 0 0 0 1.025 7.71c0 4.02 3.279 7.276 7.319 7.276a7.32 7.32 0 0 0 5.205-2.162q-.506.063-1.029.063c-4.61 0-8.343-3.714-8.343-8.29 0-1.167.242-2.278.681-3.286"/>
        </svg>
      </label>
    </div>
  </header>

  <main class="page-main map-page">
    <div class="map-shell">
      <div class="map-tabs" role="tablist" aria-label="Maps tools">
        <button class="map-tab active" id="teamTabBtn" type="button" role="tab" aria-selected="true" data-tab="team">Team Overview</button>
        <button class="map-tab" id="mapTabBtn" type="button" role="tab" aria-selected="false" data-tab="map">Interactive Map</button>
        <div class="backup-actions">
          <button class="map-pin-btn" id="exportDbBtn" type="button">Save DB</button>
          <label class="csv-btn backup-import">
            Load DB
            <input type="file" id="importDbInput" accept=".db,.sqlite,.sqlite3">
          </label>
        </div>
      </div>

      <section class="tab-panel active" id="teamTabPanel" role="tabpanel" aria-labelledby="teamTabBtn">
        <div class="team-layout">
          <aside class="player-panel">
            <div class="panel-title-row">
              <h1>Players</h1>
              <span id="playerCount" class="map-coords">0 players</span>
            </div>

            <form class="player-form" id="playerForm">
              <input type="text" id="playerNameInput" class="map-input" placeholder="Name" autocomplete="off">
              <input type="text" id="playerIdInput" class="map-input" placeholder="ID" autocomplete="off">
              <button class="map-pin-btn" type="submit">Add</button>
            </form>

            <div class="csv-row">
              <label class="csv-btn">
                Load CSV
                <input type="file" id="playersCsvInput" accept=".csv,text/csv">
              </label>
              <button class="detail-reset" id="clearPlayersBtn" type="button">Clear</button>
            </div>

            <div class="player-list" id="playerList"></div>
          </aside>

          <div class="team-main">
            <section class="lane-plan-card">
              <div class="planning-topbar">
                <div class="lane-plan-tabs" id="lanePlanTabs" role="tablist" aria-label="Lane plans"></div>
                <div class="ark-skills-card">
                  <span>ARK SKILLS</span>
                  <div class="ark-skill-slots" id="arkSkillSlots"></div>
                </div>
              </div>
              <div class="lane-plan-wrap" id="lanePlanWrap"></div>
            </section>
          </div>
        </div>

        <div class="skill-modal-overlay" id="skillModalOverlay" hidden>
          <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle">
            <div class="skill-modal-header">
              <h2 id="skillModalTitle">Ark Skills</h2>
              <button class="skill-modal-close" id="skillModalClose" type="button" aria-label="Close">x</button>
            </div>
            <div class="skill-modal-actions">
              <span id="skillModalCount">0 / 6 selected</span>
              <button class="detail-reset" id="clearSkillsBtn" type="button">Clear Selections</button>
            </div>
            <div class="skill-grid" id="skillGrid"></div>
          </div>
        </div>

        <div class="skill-modal-overlay" id="stageModalOverlay" hidden>
          <div class="skill-modal stage-modal" role="dialog" aria-modal="true" aria-labelledby="stageModalTitle">
            <div class="skill-modal-header">
              <h2 id="stageModalTitle">Planning Stages</h2>
              <button class="skill-modal-close" id="stageModalClose" type="button" aria-label="Close">x</button>
            </div>
            <div class="skill-modal-actions">
              <span>Default stages cannot be deleted</span>
              <button class="map-pin-btn" id="addStageModalBtn" type="button">Add Stage</button>
            </div>
            <div class="stage-manager-list" id="stageManagerList"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="mapTabPanel" role="tabpanel" aria-labelledby="mapTabBtn" hidden>
        <section class="map-toolbar" aria-label="Map controls">
          <div class="map-title-group">
            <h1>Interactive Map</h1>
            <span id="mapCoords" class="map-coords">X 0.0 / Y 0.0</span>
          </div>

          <div class="map-search">
            <input type="search" id="mapSearch" class="map-input" placeholder="Search markers" autocomplete="off">
          </div>

          <div class="map-actions" role="group" aria-label="Map actions">
            <button class="map-icon-btn" id="zoomOutBtn" type="button" title="Zoom out" aria-label="Zoom out">-</button>
            <button class="map-icon-btn" id="resetViewBtn" type="button" title="Reset view" aria-label="Reset view">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2z"/>
                <path d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466"/>
              </svg>
            </button>
            <button class="map-icon-btn" id="zoomInBtn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
            <button class="map-pin-btn" id="moveMarkersBtn" type="button" title="Move markers">Move Markers</button>
            <button class="map-pin-btn" id="addPinBtn" type="button" title="Add custom pin">Add Pin</button>
            <button class="map-pin-btn" id="addLabelBtn" type="button" title="Add map label">Add Label</button>
            <button class="map-pin-btn" id="exportPngBtn" type="button" title="Save current stage as PNG">Save PNG</button>
            <div class="map-stage-switcher" id="mapStageSwitcher"></div>
          </div>
        </section>

        <section class="map-content">
          <aside class="map-player-panel">
            <div class="panel-title-row">
              <h1>Players</h1>
              <span id="mapPlayerCount" class="map-coords">0 players</span>
            </div>
            <div class="player-list" id="mapPlayerList"></div>
          </aside>

          <aside class="map-panel">
            <div class="filter-group" id="filterGroup"></div>
            <div class="marker-list" id="markerList"></div>
          </aside>

          <div class="map-stage" id="mapStage">
            <div class="map-viewport" id="mapViewport">
              <div class="map-layer" id="mapLayer">
                <img src="icons/interactive-map.png" alt="Game world map" class="map-image" draggable="false">
                <div class="marker-layer" id="markerLayer"></div>
              </div>
            </div>
          </div>

          <aside class="map-detail" id="mapDetail">
            <div class="detail-empty">Select a marker</div>
          </aside>
        </section>
      </section>
    </div>
  </main>

  <footer>
    <div class="footer-bottom">
      <span>Interactive maps.</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.1/dist/sql-wasm.js"></script>
  <script src="js/map.js"></script>
</body>

</html>
