<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/map.css">
</head>

<body>
  <main class="page-main map-page">
    <div class="map-shell">
      <section class="map-toolbar merged" aria-label="Map controls">
        <div class="map-tabs" role="tablist" aria-label="Maps tools">
        <button class="map-tab" id="teamTabBtn" type="button" role="tab" aria-selected="false" data-tab="team">Team Overview</button>
        <button class="map-tab active" id="mapTabBtn" type="button" role="tab" aria-selected="true" data-tab="map">Interactive Map</button>
        </div>
        <div class="map-actions" role="group" aria-label="Map actions">
          <button class="map-icon-btn" id="zoomOutBtn" type="button" title="Zoom out" aria-label="Zoom out">-</button>
          <button class="map-icon-btn" id="resetViewBtn" type="button" title="Reset view" aria-label="Reset view">↻</button>
          <button class="map-icon-btn" id="zoomInBtn" type="button" title="Zoom in" aria-label="Zoom in">+</button>
          <select class="map-stage-select" id="labelShapeSelect" aria-label="Bubble shape">
            <option value="bubble-left">Bubble Left</option>
            <option value="bubble-right">Bubble Right</option>
            <option value="bubble-top">Bubble Top</option>
            <option value="bubble-bottom">Bubble Bottom</option>
            <option value="oval">Oval</option>
          </select>
          <button class="map-pin-btn" id="addLabelBtn" type="button" title="Add bubble">Add Bubble</button>
          <button class="map-pin-btn" id="exportPngBtn" type="button" title="Save current stage as PNG">Save PNG</button>
          <div class="map-section-toggle-group" id="mapSectionControls" aria-label="Map label sections"></div>
          <div class="map-stage-switcher" id="mapStageSwitcher"></div>
          <button class="map-pin-btn" id="exportDbBtn" type="button">Save DB</button>
          <label class="csv-btn backup-import">
            Load DB
            <input type="file" id="importDbInput" accept=".db,.sqlite,.sqlite3">
          </label>
        </div>
      </section>

      <section class="tab-panel" id="teamTabPanel" role="tabpanel" aria-labelledby="teamTabBtn" hidden>
        <div class="team-layout">
          <aside class="player-panel">
            <div class="panel-title-row">
              <h1>Players</h1>
              <span id="playerCount" class="map-coords">0 players</span>
            </div>

            <form class="player-form" id="playerForm">
              <input type="text" id="playerNameInput" class="map-input" placeholder="Name" autocomplete="off">
              <button class="map-pin-btn" type="submit">Add</button>
            </form>

            <div class="csv-row">
              <label class="csv-btn">
                Load CSV
                <input type="file" id="playersCsvInput" accept=".csv,text/csv">
              </label>
              <button class="detail-reset" id="clearPlayersBtn" type="button">Clear</button>
            </div>

            <div class="player-list" id="playerList"></div>
          </aside>

          <div class="team-main">
            <section class="lane-plan-card">
              <div class="planning-topbar">
                <div class="lane-plan-tabs" id="lanePlanTabs" role="tablist" aria-label="Lane plans"></div>
                <div class="ark-skills-card">
                  <span>ARK SKILLS</span>
                  <div class="ark-skill-slots" id="arkSkillSlots"></div>
                </div>
              </div>
              <div class="lane-plan-wrap" id="lanePlanWrap"></div>
            </section>
          </div>
        </div>

        <div class="skill-modal-overlay" id="skillModalOverlay" hidden>
          <div class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle">
            <div class="skill-modal-header">
              <h2 id="skillModalTitle">Ark Skills</h2>
              <button class="skill-modal-close" id="skillModalClose" type="button" aria-label="Close">x</button>
            </div>
            <div class="skill-modal-actions">
              <span id="skillModalCount">0 / 6 selected</span>
              <button class="detail-reset" id="clearSkillsBtn" type="button">Clear Selections</button>
            </div>
            <div class="skill-grid" id="skillGrid"></div>
          </div>
        </div>

        <div class="skill-modal-overlay" id="stageModalOverlay" hidden>
          <div class="skill-modal stage-modal" role="dialog" aria-modal="true" aria-labelledby="stageModalTitle">
            <div class="skill-modal-header">
              <h2 id="stageModalTitle">Planning Stages</h2>
              <button class="skill-modal-close" id="stageModalClose" type="button" aria-label="Close">x</button>
            </div>
            <div class="skill-modal-actions">
              <span>Default stages cannot be deleted</span>
              <button class="map-pin-btn" id="addStageModalBtn" type="button">Add Stage</button>
            </div>
            <div class="stage-manager-list" id="stageManagerList"></div>
          </div>
        </div>
      </section>

      <section class="tab-panel active" id="mapTabPanel" role="tabpanel" aria-labelledby="mapTabBtn">
        <section class="map-content">
          <aside class="map-player-panel">
            <div class="panel-title-row">
              <h1>Players</h1>
              <span id="mapPlayerCount" class="map-coords">0 players</span>
            </div>
            <form class="player-form" id="mapPlayerForm">
              <input type="text" id="mapPlayerNameInput" class="map-input" placeholder="Name" autocomplete="off">
              <button class="map-pin-btn" type="submit">Add</button>
            </form>
            <div class="csv-row">
              <label class="csv-btn">
                Load CSV
                <input type="file" id="mapPlayersCsvInput" accept=".csv,text/csv">
              </label>
              <button class="detail-reset" id="mapClearPlayersBtn" type="button">Clear</button>
            </div>
            <div class="player-list" id="mapPlayerList"></div>
          </aside>

          <div class="map-stage" id="mapStage">
            <div class="map-viewport" id="mapViewport">
              <div class="map-layer" id="mapLayer">
                <img src="icons/interactive-map.png" alt="Game world map" class="map-image" draggable="false">
                <div class="marker-layer" id="markerLayer"></div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.1/dist/sql-wasm.js"></script>
  <script src="js/map.js"></script>
</body>

</html>
