    <div class="page-wrapper">
    <main class="page-main">
        <div class="container">
            <section class="card">
                <h1>Compare Two Files</h1>

                <div class="put-in-row">
                    <label>File 1:</label>
                    <input type="file" id="file1" class="file" accept=".xlsx,.csv,.json" />
                </div>

                <div class="put-in-row">
                    <label>File 2:</label>
                    <input type="file" id="file2" class="file" accept=".xlsx,.csv,.json" />
                </div>

                <div class="put-in-row">
                    <label>Key Column:</label>
                    <input type="text" id="keyColumn" class="file" placeholder="Enter column name" />
                </div>

                <div class="put-in-row">
                    <label>Comparison Option:</label>
                    <select id="compareOption" class="file">
                        <option value="both">Both</option>
                        <option value="pierwszy">First Only</option>
                        <option value="drugi">Second Only</option>
                    </select>
                </div>

                <div class="put-in-row">
                    <button id="compareBtn" class="primary">Compare</button>
                    <progress id="progressBar" value="0" max="100"></progress>
                </div>

                <div class="put-in-row">
                    <button id="export-xlsx" class="primary">Export XLSX</button>
                    <button id="export-csv" class="primary">Export CSV</button>
                    <button id="export-json" class="primary">Export JSON</button>
                </div>

                <div id="compare-results-info" class="muted">No compared data yet.</div>
                <div id="matching-table" class="ag-theme-quartz" style="height: 500px"></div>
                <div id="nonmatching-table" class="ag-theme-quartz" style="height: 500px; margin-top: 25px;"></div>
            </section>
        </div>
    </main>

    <footer id="contact">
