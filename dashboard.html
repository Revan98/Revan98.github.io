		    </svg>
		    Export CSV
		  </button>
		  <button id="copy-top18-btn" class="shared-style-btn">
		    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">

		    </svg>
		    Copy Top 18
		  </button>
		  <input type="text" id="quickFilter" placeholder="Search..." class="quick-filter" oninput="onFilterTextBoxChanged()" />
		</div>

        <div id="loading-spinner" class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading data...</p>

        </div>
